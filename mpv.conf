#### General
profile=gpu-hq
#gpu-api=opengl  # Uncomment this if you notice stuttering with vulkan
gpu-api=vulkan  # Comment this if you notice stuttering and uncomment the above line
fbo-format=rgba16hf
vulkan-async-compute=yes
vulkan-async-transfer=yes
vulkan-queue-count=1
vd-lavc-dr=yes
spirv-compiler=auto
cursor-autohide=250
keep-open=yes
force-window=yes
reset-on-next-file=profile
msg-module
msg-color
keepaspect


#### OSD/OSC
osc=no
#border=no
title=${filename} - [${playback-time/full} / ${duration}] (${percent-pos}%) - frame: [${estimated-frame-number} / ${estimated-frame-count}] - mpv media player
#osd-font="Noto Sans"
#osd-blur=0.2
#osd-bold=yes
#osd-border-size=3.2


#### Window
autofit-larger=100%x85%
force-window-position=yes


#### Priority
#slang=en,eng
#alang=ja,jp,jpn,en,eng


#### Video
# Also includes all the filtering-related flags
vo=gpu
audio-display=attachment


# Streaming
script-opts=ytdl_hook-ytdl_path=yt-dlp.exe
cache=yes
cache-pause=yes
cache-pause-wait=2
cache-pause-initial=yes
demuxer-max-bytes=40000KiB
stream-buffer-size=10MiB
hls-bitrate=max

# Seeking
force-seekable=yes
hr-seek=absolute
hr-seek-framedrop=no


# Shaders
glsl-shader="~~/shaders/nnedi3-nns64-win8x6.hook"   # Luma upscale
glsl-shader="~~/shaders/SSimDownscaler.glsl"        # Luma downscale
#glsl-shader="~~/shaders/KrigBilateral.glsl"        # Chroma up- & downscale

# Additional resizer options
scale=ewa_lanczos
sigmoid-upscaling=no
dscale=mitchell
linear-downscaling=no
cscale=sinc
cscale-window=blackman
cscale-radius=3


# Deband
deband=no
deband-iterations=2
deband-threshold=64
deband-range=17
deband-grain=12


#### Audio
audio-file-auto=fuzzy
audio-pitch-correction=yes
volume=100
volume-max=200


## Subs
# Settings for text-based subtitle files (ASS, SRT)
# This style is an approximation of the GJM_Main dialogue style
### NOTE: Currently disabled while I try and sort it into profiles
sub-ass-override=no # Toggle with 'k'
sub-ass-force-style=playresx=1920,playresy=1080
sub-font="Gandhi Sans"
sub-font-size=50
sub-color="#FFFFFF"
sub-border-size=2.4
sub-border-color="#FF000000"
sub-shadow-color="#A0000000"
sub-shadow-offset=0.75
sub-ass
sub-bold
sub-ass-force-margins=yes
sub-ass-force-style=Kerning=yes


# Settings for image-based subtitle files (PGS, SUP)
#sub-gray
sub-gauss=0.05


# Other general settings
demuxer-mkv-subtitle-preroll=yes
sub-ass-vsfilter-blur-compat=no
sub-fix-timing=no
sub-font-provider=none
#embeddedfonts=no


# Auto subtitle file pathing
sub-auto=fuzzy
sub-file-paths-append=ass
sub-file-paths-append=srt
sub-file-paths-append=pgs
sub-file-paths-append=vob
sub-file-paths-append=sub
sub-file-paths-append=sup
sub-file-paths-append=subs
sub-file-paths-append=subtitles



#### Screenshots WEBP
zimg-scaler=spline36
zimg-scaler-chroma=bicubic
zimg-scaler-chroma-param-a=0
zimg-scaler-chroma-param-b=0.5
zimg-dither=error-diffusion
zimg-fast=no
screenshot-format=webp
screenshot-webp-lossless=yes
screenshot-webp-compression=6
screenshot-template="%F_%P_%n"
screenshot-directory="C:\Users\Youss\Pictures\Anime Screenshots"


#### Screenshots PNG
#screenshot-format=png
#screenshot-high-bit-depth=no
#screenshot-tag-colorspace=yes
#screenshot-png-compression=9
#screenshot-directory="C:\Users\Youss\Pictures\Anime Screenshots"
#screenshot-template="%F_%P_%n"


#### Screenshots JPEG
#screenshot-format=jpeg
#screenshot-jpeg-quality=100
#screenshot-directory="C:\Users\Youss\Desktop"
#screenshot-template="%F_%P_%n"

#### Custom Profiles
# SD
[SD]
glsl-shaders-remove="~~/shaders/nnedi3-nns64-win8x6.hook"
glsl-shader="~~/shaders/FSRCNNX_x2_16-0-4-1.glsl"

[SD-no]
glsl-shaders-remove="~~/shaders/FSRCNNX_x2_16-0-4-1.glsl"
glsl-shader="~~/shaders/nnedi3-nns64-win8x6.hook"

# pixelformats
[444]
glsl-shader="~~/Shaders/KrigBilateral-new-444.glsl"

[444-no]
glsl-shaders-remove="~~/Shaders/KrigBilateral-new-444.glsl

[420]
glsl-shader="~~/Shaders/KrigBilateral-new.glsl"

[420-no]
glsl-shaders-remove="~~/Shaders/KrigBilateral-new.glsl"
 
# Deinterlacing
[VIVTC]
profile-desc="Deinterlacing mode: VIVTC"
vf-append=@ivtc:vapoursynth="~~/vs/ivtc.vpy":buffered-frames=5:concurrent-frames=5

[VIVTC + nnedi3]
profile-desc="Deinterlacing mode: VIVTC + nnedi3"
vf-remove=@ivtc
vf-append=@deinterlace:vapoursynth="~~/vs/deinterlace.vpy":buffered-frames=5:concurrent-frames=5

[YADIF]
profile-desc="Deinterlacing mode: YADIF"
vf-remove=@deinterlace
deinterlace=yes

[Deinterlace-no]
profile-desc="Deinterlacing mode: disabled"
deinterlace=no


# Sharpening through warping (but why would you...)
[warpsharp]
profile-desc="Sharpening mode: aWarpSharp2"
vf-append=@warpsharp:vapoursynth="~~/vs/warpsharp_neo.vpy":buffered-frames=3:concurrent-frames=4

[warpsharp-legacy]  # Kept for legacy purposes.
profile-desc="Sharpening mode: aWarpSharp2 (legacy)"
vf-remove=@warpsharp
vf-append=@warpsharp_legacy:vapoursynth="~~/vs/warpsharp.vpy":buffered-frames=3:concurrent-frames=4

[sharpen-no]
profile-desc="Sharpening mode: disabled"
vf-remove=@warpsharp
vf-remove=@warpsharp_legacy

# Write frame information ontop of the video
[frameinfo]
profile-desc="Printing Frame Info"
vf-append=@frameinfo:vapoursynth="~~/vs/frameinfo.vpy":buffered-frames=3:concurrent-frames=4

[frameinfo-no]
profile-desc="Stop printing Frame Info"
vf-remove=@frameinfo

# Generic clean-up for simulcasts
[simulcast]
vf-append=@simulcast:vapoursynth="~~/vs/simulcast.vpy":buffered-frames=3:concurrent-frames=4
#vf-append=@simulcast2:vapoursynth="~~/vpy/debandgrain.vpy":4:auto
profile-desc="Auto-override: True"
glsl-shaders-append=~~/shaders/noise_static_luma.hook
sub-ass-override=force
sub-fix-timing=yes

[simulcast-no]
vf-remove=@simulcast
#vf-remove=@simulcast2
profile-desc="Auto-override: False"
glsl-shaders-remove=~~/shaders/noise_static_luma.hook
sub-ass-override=no
sub-fix-timing=no


# Proper Downmix
[downmix]
af-add=@downmix:lavfi="pan=stereo|FL < 0.5*FC + 0.3*FLC + 0.3*FL + 0.3*BL + 0.3*SL + 0.5*LFE | FR < 0.5*FC + 0.3*FRC + 0.3*FR + 0.3*BR + 0.3*SR + 0.5*LFE"
af-add=@downmix2:lavfi="acompressor=10"

[downmix-no]
af-remove=@downmix,@downmix2

[ww-ext-image]
profile-desc=Profile for external image rendering
audio-file-auto=no
sub-auto=no
image-display-duration=inf
loop-file=inf
loop-playlist=inf
force-window=immediate
video-aspect-override=no
video-sync=audio

# Auto Profiles
[simulcast-autoprofile]
profile-cond=string.match(p.filename, "HorribleSubs")~=nil or string.match(p.filename, "Erai%-raws")~=nil or string.match(p.filename, "SubsPlease")~=nil or string.match(p.filename, "%[MTBB] Mushoku")~=nil
profile=simulcast

[nonsimulcast-autoprofile]
profile-cond=string.match(p.filename, "HorribleSubs")==nil and string.match(p.filename, "Erai%-raws")==nil and string.match(p.filename, "SubsPlease")==nil and string.match(p.filename, "%[MTBB] Mushoku")==nil
profile=simulcast-no

[downmix-autoprofile]
profile-cond=p["audio-params/channels"]~="empty" and p["audio-params/channels"]~="mono" and p["audio-params/channels"]~="1.0" and p["audio-params/channels"]~="stereo" and p["audio-params/channels"]~="2.0"
profile=downmix

[nondownmix-autoprofile]
profile-cond=p["audio-params/channels"]=="empty" or p["audio-params/channels"]=="mono" or p["audio-params/channels"]=="1.0" or p["audio-params/channels"]=="stereo" or p["audio-params/channels"]=="2.0"
profile=downmix-no

[444-autoprofile]
profile-cond=p["video-params/pixelformat"]=="yuv444p10"
profile=444

[non444-autoprofile]
profile-cond=p["video-params/pixelformat"]~="yuv444p10"
profile=444-no

[420-autoprofile]
profile-cond=p["video-params/pixelformat"]=="yuv420p12" or p["video-params/pixelformat"]=="yuv420p10" or p["video-params/pixelformat"]=="yuv420p"
profile=420

[non420-autoprofile]
profile-cond=p["video-params/pixelformat"]~="yuv420p12" and p["video-params/pixelformat"]~="yuv420p10" and p["video-params/pixelformat"]~="yuv420p"
profile=420-no

[SD-autoprofile]
profile-cond=p["video-params/w"] <= 1279 or p["video-params/h"] <= 699
profile=SD

[nonSD-autoprofile]
profile-cond=p["video-params/w"] > 1279 and p["video-params/h"] > 699
profile=SD-no


[extension.bmp]
profile=ww-ext-image
[extension.gif]
profile=ww-ext-image
[extension.jpeg]
profile=ww-ext-image
[extension.jpg]
profile=ww-ext-image
[extension.png]
profile=ww-ext-image
[extension.tif]
profile=ww-ext-image
[extension.tiff]
profile=ww-ext-image
[extension.webp]
profile=ww-ext-image
